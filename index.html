<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Via do Terno | Inteligência de Inadimplência</title>
  <link rel="icon" type="image/png" href="ESCUDO.png" />
  <style>
    :root{font-family:Inter,Arial,sans-serif;color:#172033;background:#f6f7fb}body{margin:0;min-height:100vh;display:grid;place-items:center}.boot{max-width:520px;background:#fff;border:1px solid #e7e9f0;border-radius:22px;padding:28px;box-shadow:0 18px 60px rgba(16,24,40,.12);text-align:center}.boot img{width:74px;height:74px;object-fit:contain}.boot h1{font-size:22px;margin:14px 0 8px}.boot p{margin:0;color:#667085;line-height:1.5}.bar{height:8px;background:#eef2f7;border-radius:999px;overflow:hidden;margin-top:20px}.bar span{display:block;height:100%;width:40%;background:#253858;border-radius:999px;animation:load 1.1s infinite ease-in-out}@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(260%)}}.err{color:#b42318;background:#fff1f0;border:1px solid #fecdca;border-radius:12px;padding:12px;margin-top:16px;text-align:left;font-size:14px}
  </style>
</head>
<body>
  <div class="boot" id="bootBox">
    <img src="ESCUDO.png" alt="Via do Terno" />
    <h1>Carregando sistema</h1>
    <p>Revisão 27 — desempenho. Aguarde a abertura do painel.</p>
    <div class="bar"><span></span></div>
  </div>
  <script>
    (async function iniciarRevisao27(){
      const BASE = "https://cdn.jsdelivr.net/gh/suportevia/inadimplencia-via-do-terno@aeaeb802e188d334e359d50af6f160eae2f453b0/";
      const bootBox = document.getElementById("bootBox");
      try {
        const resposta = await fetch(BASE + "index.html", { cache: "force-cache" });
        if (!resposta.ok) throw new Error("Não foi possível carregar a base mestre do sistema.");
        let html = await resposta.text();

        html = html.replace(
          /<link\s+href=["']index\.css["']\s+rel=["']stylesheet["']\s*\/?\s*>/i,
          '<link href="' + BASE + 'index.css" rel="stylesheet"><link href="index.performance.css?v=27" rel="stylesheet">'
        );

        html = html.replace(
          /<script\s+src=["']index\.js["']\s*>\s*<\/script>/i,
          '<script src="' + BASE + 'index.js"><\/script><script src="index.performance.js?v=27"><\/script>'
        );

        if (!/index\.performance\.css/.test(html)) {
          html = html.replace("</head>", '<link href="index.performance.css?v=27" rel="stylesheet"></head>');
        }
        if (!/index\.performance\.js/.test(html)) {
          html = html.replace("</body>", '<script src="index.performance.js?v=27"><\/script></body>');
        }

        document.open();
        document.write(html);
        document.close();
      } catch (erro) {
        console.error(erro);
        if (bootBox) {
          bootBox.innerHTML = '<img src="ESCUDO.png" alt="Via do Terno"/><h1>Não foi possível abrir o sistema</h1><p>Confira a conexão com a internet e tente novamente.</p><div class="err">Detalhe técnico: ' + String(erro && erro.message ? erro.message : erro).replace(/[<>]/g, '') + '</div>';
        }
      }
    })();
  </script>
</body>
</html>
